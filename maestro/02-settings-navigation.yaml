appId: com.poyka.ripdpi
---
- launchApp:
    stopApp: true
    arguments:
      com.poyka.ripdpi.automation.ENABLED: "true"
      com.poyka.ripdpi.automation.RESET_STATE: "true"
      com.poyka.ripdpi.automation.START_ROUTE: "settings"
      com.poyka.ripdpi.automation.DISABLE_MOTION: "true"
      com.poyka.ripdpi.automation.PERMISSION_PRESET: "granted"
      com.poyka.ripdpi.automation.SERVICE_PRESET: "idle"
      com.poyka.ripdpi.automation.DATA_PRESET: "settings_ready"
- assertVisible:
    id: "settings-screen"
- tapOn:
    id: "settings-advanced-settings"
- assertVisible:
    id: "advanced_settings-screen"
