syntax = "proto3";
option java_package = "com.poyka.ripdpi.proto";
option java_multiple_files = true;

message NumericRange {
  int64 start = 1; // -1 means unset
  int64 end = 2;   // -1 means unset
}

message ActivationFilter {
  NumericRange round = 1;
  NumericRange payload_size = 2;
  NumericRange stream_bytes = 3;
}

message StrategyTcpStep {
  string kind = 1;
  string marker = 2;
  string midhost_marker = 3;
  string fake_host_template = 4;
  int32 fragment_count = 5;
  int32 min_fragment_size = 6;
  int32 max_fragment_size = 7;
  ActivationFilter activation_filter = 8;
  int32 overlap_size = 9;
  string fake_mode = 10;
  string ipv6_extension_profile = 11;
}

message StrategyUdpStep {
  string kind = 1;
  int32 count = 2;
  ActivationFilter activation_filter = 3;
  int32 split_bytes = 4;
  string ipv6_extension_profile = 5;
}

message AppSettings {
  reserved 15, 16, 17, 29, 30, 31, 32, 69, 71, 93, 94, 130;
  reserved
      "desync_method",
      "split_position",
      "split_at_host",
      "tlsrec_enabled",
      "tlsrec_position",
      "tlsrec_at_sni",
      "udp_fake_count",
      "split_marker",
      "tlsrec_marker",
      "dns_doh_url",
      "dns_doh_bootstrap_ips",
      "settings_migration_level";

  // General
  string app_theme = 1;       // "system" | "light" | "dark"
  string ripdpi_mode = 2;     // "vpn" | "proxy"
  string dns_ip = 3;
  bool ipv6_enable = 4;

  // Mode toggle
  bool enable_cmd_settings = 5;
  string cmd_args = 6;

  // Proxy
  string proxy_ip = 7;
  int32 proxy_port = 8;
  int32 max_connections = 9;
  int32 buffer_size = 10;
  bool no_domain = 11;
  bool tcp_fast_open = 12;

  // Desync
  int32 default_ttl = 13;
  bool custom_ttl = 14;
  int32 fake_ttl = 18;
  string fake_sni = 19;
  int32 fake_offset = 20;
  string oob_data = 21;
  bool drop_sack = 22;

  // Protocol
  bool desync_http = 23;
  bool desync_https = 24;
  bool desync_udp = 25;

  // Hosts
  string hosts_mode = 26;      // "disable" | "blacklist" | "whitelist"
  string hosts_blacklist = 27;
  string hosts_whitelist = 28;

  // HTTP
  bool host_mixed_case = 33;
  bool domain_mixed_case = 34;
  bool host_remove_spaces = 35;
  bool onboarding_complete = 56;
  bool webrtc_protection_enabled = 57;
  bool biometric_enabled = 58;
  string backup_pin = 59;
  string app_icon_variant = 60; // "default" | "dark" | "black" | "raven"
  string app_icon_style = 61;   // "themed" | "plain"
  bool diagnostics_monitor_enabled = 62;
  int32 diagnostics_sample_interval_seconds = 63;
  string diagnostics_default_scan_path_mode = 64; // "raw_path" | "in_path"
  bool diagnostics_auto_resume_after_raw_scan = 65;
  string diagnostics_active_profile_id = 66;
  int32 diagnostics_history_retention_days = 67;
  bool diagnostics_export_include_history = 68;
  string fake_offset_marker = 70;
  repeated StrategyTcpStep tcp_chain_steps = 72;
  repeated StrategyUdpStep udp_chain_steps = 73;
  string quic_initial_mode = 74; // "disabled" | "route" | "route_and_cache"
  bool quic_support_v1 = 75;
  bool quic_support_v2 = 76;
  bool host_autolearn_enabled = 77;
  int32 host_autolearn_penalty_ttl_hours = 78;
  int32 host_autolearn_max_hosts = 79;
  bool fake_tls_use_original = 80;
  bool fake_tls_randomize = 81;
  bool fake_tls_dup_session_id = 82;
  bool fake_tls_pad_encap = 83;
  int32 fake_tls_size = 84;
  string fake_tls_sni_mode = 85; // "fixed" | "randomized"
  string quic_fake_profile = 86; // "disabled" | "compat_default" | "realistic_initial"
  string quic_fake_host = 87;
  string http_fake_profile = 88; // "compat_default" | "iana_get" | "cloudflare_get"
  string tls_fake_profile = 89; // "compat_default" | "iana_firefox" | "google_chrome" | "vk_chrome" | "sberbank_chrome" | "rutracker_kyber" | "bigsize_iana"
  string udp_fake_profile = 90; // "compat_default" | "zero_256" | "zero_512" | "dns_query" | "stun_binding" | "wireguard_initiation" | "dht_get_peers"
  string dns_mode = 91; // "plain_udp" | "encrypted"
  string dns_provider_id = 92; // "cloudflare" | "google" | "quad9" | "adguard" | "custom"
  ActivationFilter group_activation_filter = 95;
  string encrypted_dns_protocol = 96; // "doh" | "dot" | "dnscrypt" | "doq"
  string encrypted_dns_host = 97;
  int32 encrypted_dns_port = 98;
  string encrypted_dns_tls_server_name = 99;
  repeated string encrypted_dns_bootstrap_ips = 100;
  string encrypted_dns_doh_url = 101;
  string encrypted_dns_dnscrypt_provider_name = 102;
  string encrypted_dns_dnscrypt_public_key = 103;
  bool http_method_eol = 104;
  bool http_unix_eol = 105;
  bool adaptive_fake_ttl_enabled = 106;
  int32 adaptive_fake_ttl_delta = 107;
  int32 adaptive_fake_ttl_min = 108;
  int32 adaptive_fake_ttl_max = 109;
  int32 adaptive_fake_ttl_fallback = 110;
  bool network_strategy_memory_enabled = 111;
  bool ws_tunnel_enabled = 112;
  string ws_tunnel_mode = 113;

  // TCP window and timestamp manipulation
  int32 window_clamp = 116;            // TCP_WINDOW_CLAMP value (0 = disabled)
  bool strip_timestamps = 117;         // Strip TCP Timestamps option from outgoing segments

  // Banner dismiss state
  bool battery_banner_dismissed = 114;
  bool background_guidance_dismissed = 115;

  // QUIC DPI evasion
  bool quic_sni_split = 118;
  bool quic_bind_low_port = 119;
  int32 quic_dummy_prepend_size = 120;    // 0 = disabled, >0 = prepend size
  uint32 quic_fake_version = 121;         // 0 = disabled, non-zero = version to use
  bool quic_migrate_after_handshake = 122;

  // Strategy evolution (Geneva-style adaptive exploration)
  bool strategy_evolution = 123;       // Enable automated combo exploration
  double evolution_epsilon = 124;      // Exploration rate 0.0-1.0 (default 0.1)

  // Entropy-aware padding
  int32 entropy_padding_target_permil = 125;  // 0 = disabled, 3400 = target 3.4 popcount
  int32 entropy_padding_max = 126;            // Max padding bytes (default 256)
  int32 entropy_mode = 127;                   // 0=disabled 1=popcount 2=shannon 3=combined
  int32 shannon_entropy_target_permil = 128;  // 0 = disabled, 7920 = target 7.92 bits/byte

  // Connection freeze detection (TSPU degradation mode)
  bool freeze_detection_enabled = 129;       // Detect throttled/frozen connections

  // TCP window size control (wsize)
  int32 wsize_window = 36;                   // TCP window size in bytes (0 = disabled)
  int32 wsize_scale = 131;                   // Window scale factor (-1 = auto, 0-14 = explicit)

  // MTProto Fake-TLS domain selection
  string ws_tunnel_fake_sni = 134;           // Cover domain for WS tunnel TLS SNI (empty = disabled)

  // Root mode
  bool root_mode_enabled = 135;

  // WARP integration
  bool warp_enabled = 136;
  string warp_route_mode = 137; // "off" | "rules"
  string warp_route_hosts = 138;
  bool warp_builtin_rules_enabled = 139;
  string warp_endpoint_selection_mode = 140; // "automatic" | "manual"
  string warp_manual_endpoint_host = 141;
  string warp_manual_endpoint_v4 = 142;
  string warp_manual_endpoint_v6 = 143;
  int32 warp_manual_endpoint_port = 144;
  bool warp_scanner_enabled = 145;
  int32 warp_scanner_parallelism = 146;
  int32 warp_scanner_max_rtt_ms = 147;
  bool warp_amnezia_enabled = 148;
  int32 warp_amnezia_jc = 149;
  int32 warp_amnezia_jmin = 150;
  int32 warp_amnezia_jmax = 151;
  int64 warp_amnezia_h1 = 152;
  int64 warp_amnezia_h2 = 153;
  int64 warp_amnezia_h3 = 154;
  int64 warp_amnezia_h4 = 155;
  int32 warp_amnezia_s1 = 156;
  int32 warp_amnezia_s2 = 157;
  int32 warp_amnezia_s3 = 158;
  int32 warp_amnezia_s4 = 159;
  string warp_amnezia_preset = 213; // "off" | "balanced" | "aggressive" | "custom"

  // Tier 2 adaptive fallback
  bool adaptive_fallback_enabled = 160;
  bool adaptive_fallback_torst = 161;
  bool adaptive_fallback_tls_err = 162;
  bool adaptive_fallback_http_redirect = 163;
  bool adaptive_fallback_connect_failure = 164;
  bool adaptive_fallback_auto_sort = 165;
  int32 adaptive_fallback_cache_ttl_seconds = 166;
  int32 adaptive_fallback_cache_prefix_v4 = 167;

  // Tier 2 HTTP parser evasions
  bool http_method_space = 168;
  bool http_host_pad = 169;

  // Tier 3 upstream relay
  bool relay_enabled = 170;
  string relay_kind = 171; // "off" | "vless_reality" | "hysteria2" | "chain_relay" | "masque" | "cloudflare_tunnel"
  string relay_profile_id = 172;
  string relay_server = 173;
  int32 relay_server_port = 174;
  string relay_server_name = 175;
  string relay_reality_public_key = 176;
  string relay_reality_short_id = 177;
  string relay_chain_entry_server = 178;
  int32 relay_chain_entry_port = 179;
  string relay_chain_entry_server_name = 180;
  string relay_chain_entry_public_key = 181;
  string relay_chain_entry_short_id = 182;
  string relay_chain_exit_server = 183;
  int32 relay_chain_exit_port = 184;
  string relay_chain_exit_server_name = 185;
  string relay_chain_exit_public_key = 186;
  string relay_chain_exit_short_id = 187;
  string relay_masque_url = 188;
  bool relay_masque_use_http2_fallback = 189;
  bool relay_masque_cloudflare_mode = 190;
  string relay_local_socks_host = 191;
  int32 relay_local_socks_port = 192;
  bool relay_udp_enabled = 193;
  bool relay_tcp_fallback_enabled = 194;
  string relay_vless_transport = 214; // "reality_tcp" | "xhttp"
  string relay_xhttp_path = 215;
  string relay_xhttp_host = 216;

  // WARP active profile metadata (non-secret)
  string warp_profile_id = 195;
  string warp_account_kind = 196; // "consumer_free" | "consumer_plus" | "zero_trust"
  string warp_zero_trust_org = 197;
  string warp_setup_state = 198; // "not_configured" | "provisioning" | "provisioned" | "needs_attention"
  string warp_last_scanner_mode = 199; // "automatic" | "manual" | "rescan"

  // Tier 4 strategy packs
  string strategy_pack_channel = 200; // "stable" | "beta"
  string strategy_pack_pinned_id = 201;
  string strategy_pack_pinned_version = 202;
  string strategy_pack_refresh_policy = 203; // "manual" | "automatic"

  // Tier 4 TLS fingerprint profile for app-owned TLS clients
  string tls_fingerprint_profile = 204; // migration accepts "native_default"; runtime normalizes to "chrome_stable" | "firefox_stable"

  bool exclude_russian_apps_enabled = 205;

  // Anti-spy hardening: route all traffic through VPN with no app exclusions
  bool full_tunnel_mode = 206;

  // Detection check settings
  bool detection_check_include_bypass = 207;   // Include localhost proxy scanning (default true)
  bool detection_check_include_location = 208; // Include PLMN/BSSID checks (default true)

  // Community comparison (anonymous opt-in)
  bool community_comparison_enabled = 209;
  string community_api_url = 210;

  // HTTP parser evasion: Host header manipulation
  bool http_host_extra_space = 211;  // Insert space before colon: "Host : example.com"
  bool http_host_tab = 212;          // Tab separator: "Host:\texample.com"
}
