name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1" # Monday 04:30 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # java-kotlin disabled: CodeQL v4 does not yet support Kotlin 2.3.20.
          # Re-enable once github/codeql-action supports this version.
          # - language: java-kotlin
          #   build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # java-kotlin build steps removed while Kotlin 2.3.20 support is pending.
      # Restore JDK/Android SDK setup and compileDebugKotlin when re-enabling.

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
