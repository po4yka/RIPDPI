name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

      - name: Build release AAB and APK
        env:
          RUSTC_WRAPPER: sccache
          RIPDPI_SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          RIPDPI_SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RIPDPI_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RIPDPI_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload release AAB
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release retrace inputs
        uses: actions/upload-artifact@v7
        with:
          name: release-retrace-inputs
          path: |
            app/build/outputs/mapping/release/mapping.txt
            app/build/intermediates/compose_mapping/release/compose-mapping.txt
          retention-days: 90

      - name: Upload release native symbols
        uses: actions/upload-artifact@v7
        with:
          name: release-native-symbols
          path: app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out/**
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
