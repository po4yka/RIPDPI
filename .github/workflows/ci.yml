name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      soak_profile:
        description: Native soak profile for manual runs
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full
      run_maestro_smoke:
        description: Run Maestro smoke flows after Android instrumentation
        required: false
        default: false
        type: boolean
      run_appium_smoke:
        description: Run Appium smoke tests after Android instrumentation
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install native verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Install cargo-bloat
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK and run unit tests
        env:
          RUSTC_WRAPPER: sccache
        run: ./gradlew assembleDebug testDebugUnitTest

      - name: Verify screenshot baselines
        run: ./gradlew verifyRoborazziDebug

      - name: Verify packaged native ELFs
        run: python3 scripts/ci/verify_native_elfs.py

      - name: Verify packaged native library sizes
        run: python3 scripts/ci/verify_native_sizes.py

      - name: Verify representative native bloat hotspots
        run: python3 scripts/ci/verify_native_bloat.py

      - name: Dump current native bloat baseline (on failure)
        if: failure()
        run: python3 scripts/ci/verify_native_bloat.py --dump-current > /tmp/native-bloat-baseline.json

      - name: Upload native bloat baseline (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-bloat-baseline
          path: /tmp/native-bloat-baseline.json
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/golden-diffs/
            **/build/outputs/roborazzi/
            **/build/outputs/roborazzi/
          retention-days: 7

  static-analysis:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: gradle/actions/setup-gradle@v6

      - name: Install cargo-deny and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0,cargo-nextest

      - name: Run cargo-deny
        run: cargo deny --manifest-path native/rust/Cargo.toml check

      - name: Run native Rust checks
        env:
          RUSTC_WRAPPER: sccache
        run: bash scripts/ci/run-rust-native-checks.sh

      - name: Run static analysis
        run: ./gradlew staticAnalysis

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/detekt/
            build/reports/file-loc-limits/
            **/build/reports/ktlint/
            **/build/reports/lint-results*.html
            native/rust/target/golden-diffs/
          retention-days: 7

  release-verification:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain-release
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain-release.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify minified release build
        env:
          RUSTC_WRAPPER: sccache
        run: ./gradlew :app:assembleRelease

      - name: Upload release retrace inputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-retrace-inputs
          path: |
            app/build/outputs/mapping/release/mapping.txt
            app/build/intermediates/compose_mapping/release/compose-mapping.txt
          retention-days: 7

      - name: Upload release native symbols
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-native-symbols
          path: app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out/**
          retention-days: 7

  rust-network-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run repo-owned Rust network E2E
        run: bash scripts/ci/run-rust-network-e2e.sh

  cli-packet-smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install CLI packet capture tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y jq tcpdump tshark
          sudo setcap cap_net_raw,cap_net_admin=eip "$(command -v tcpdump)"

      - name: Run CLI packet smoke matrix
        run: bash scripts/ci/run-cli-packet-smoke.sh

      - name: Upload CLI packet smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-packet-smoke
          path: build/packet-smoke/cli/**
          retention-days: 7

  rust-turmoil:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run turmoil-backed deterministic network tests
        run: bash scripts/ci/run-rust-turmoil-tests.sh

  coverage:
    if: github.event_name != 'schedule'
    needs: [build, static-analysis]
    runs-on: ubuntu-latest
    env:
      RIPDPI_ENFORCE_COVERAGE_THRESHOLDS: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy, llvm-tools

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain-coverage
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain-coverage.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v6

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate Kotlin coverage reports
        run: ./gradlew coverageReport

      - name: Generate Rust coverage reports
        run: bash scripts/ci/run-rust-coverage.sh

      - name: Summarize coverage
        run: |
          python3 scripts/ci/summarize_coverage.py \
            --aggregate-xml build/reports/jacoco/kotlinCoverageReport/kotlinCoverageReport.xml \
            --module app=app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:data=core/data/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:diagnostics=core/diagnostics/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:engine=core/engine/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:service=core/service/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --rust-metrics-env native/rust/target/coverage/metrics.env \
            --markdown-output "$RUNNER_TEMP/coverage-summary.md"
          cat "$RUNNER_TEMP/coverage-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts
          path: |
            build/reports/jacoco/
            app/build/reports/jacoco/
            core/**/build/reports/jacoco/
            native/rust/target/coverage/
          retention-days: 7

  rust-criterion-bench:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          prefix-key: criterion

      - name: Restore criterion baseline from main
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: native/rust/target/criterion
          key: criterion-baseline-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            criterion-baseline-

      - name: Run criterion benchmarks
        run: |
          cd native/rust
          cargo bench --package ripdpi-bench 2>&1 | tee "$RUNNER_TEMP/criterion-output.txt"

      - name: Check for regressions
        run: |
          python3 scripts/ci/check-criterion-regressions.py \
            --criterion-dir native/rust/target/criterion \
            --baseline scripts/ci/rust-bench-baseline.json \
            --warn-only \
            --markdown-output "$RUNNER_TEMP/criterion-summary.md"
          cat "$RUNNER_TEMP/criterion-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Save criterion baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: native/rust/target/criterion
          key: criterion-baseline-${{ github.sha }}

      - name: Upload criterion artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-bench-artifacts
          path: |
            native/rust/target/criterion/
            ${{ runner.temp }}/criterion-output.txt
            ${{ runner.temp }}/criterion-summary.md
          retention-days: 7

  android-macrobenchmark:
    if: github.event_name != 'schedule'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run macrobenchmarks
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          profile: pixel_6
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            set -euo pipefail
            ./gradlew :baselineprofile:connectedAndroidTest \
              -Pripdpi.localNativeAbis=x86_64 \
              -Pandroid.testInstrumentationRunnerArguments.class=com.poyka.ripdpi.baselineprofile.StartupBenchmark
        env:
          RUSTC_WRAPPER: sccache

      - name: Check for regressions
        run: |
          python3 scripts/ci/check-macrobenchmark-regressions.py \
            --results-dir baselineprofile/build/outputs/connected_android_test_additional_output \
            --baseline scripts/ci/macrobenchmark-baseline.json \
            --warn-only \
            --markdown-output "$RUNNER_TEMP/macrobenchmark-summary.md"
          cat "$RUNNER_TEMP/macrobenchmark-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macrobenchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macrobenchmark-artifacts
          path: |
            baselineprofile/build/outputs/
            ${{ runner.temp }}/macrobenchmark-summary.md
          retention-days: 7

  rust-loom:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          prefix-key: loom

      - name: Run loom concurrency tests
        env:
          LOOM_MAX_PREEMPTIONS: 3
        run: |
          cd native/rust
          cargo test --features loom -- loom

  rust-native-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve soak profile
        id: soak-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Run native Rust soak suites
        run: |
          mkdir -p "$RUNNER_TEMP/native-soak-artifacts"
          RIPDPI_SOAK_PROFILE="${{ steps.soak-profile.outputs.profile }}" \
            bash scripts/ci/run-rust-native-soak.sh "$RUNNER_TEMP/native-soak-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/native-soak-artifacts/rust-native-soak.log"

      - name: Upload native soak artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-soak-artifacts
          path: |
            ${{ runner.temp }}/native-soak-artifacts/
          retention-days: 7

  rust-native-load:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve load profile
        id: load-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Run native Rust load test suites
        run: |
          mkdir -p "$RUNNER_TEMP/native-load-artifacts"
          RIPDPI_SOAK_PROFILE="${{ steps.load-profile.outputs.profile }}" \
            bash scripts/ci/run-rust-native-load.sh "$RUNNER_TEMP/native-load-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/native-load-artifacts/rust-native-load.log"

      - name: Upload native load artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-load-artifacts
          path: |
            ${{ runner.temp }}/native-load-artifacts/
          retention-days: 7

  nightly-rust-coverage:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      RIPDPI_ENFORCE_COVERAGE_THRESHOLDS: "1"
      RIPDPI_RUST_COVERAGE_INCLUDE_IGNORED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy, llvm-tools

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: nightly-native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.nightly-native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v6

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate Kotlin coverage reports
        run: ./gradlew coverageReport

      - name: Generate Rust coverage reports with ignored tests
        run: bash scripts/ci/run-rust-coverage.sh

      - name: Upload nightly coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-coverage-artifacts
          path: |
            build/reports/jacoco/
            app/build/reports/jacoco/
            core/**/build/reports/jacoco/
            native/rust/target/coverage/
          retention-days: 7

  android-network-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Appium dependencies
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_appium_smoke == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.appium
            ~/.cache/pip
          key: appium-deps-${{ hashFiles('appium/requirements.txt') }}
          restore-keys: |
            appium-deps-

      - name: Start local network fixture
        run: |
          mkdir -p "$RUNNER_TEMP/local-network-fixture"
          scripts/ci/start-local-network-fixture.sh \
            "$RUNNER_TEMP/local-network-fixture/fixture.log" \
            "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json" \
            "$RUNNER_TEMP/local-network-fixture/fixture.pid"
          cat "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json"

      - name: Run connected Android network E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_8
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            set -euo pipefail
            ./gradlew :app:connectedDebugAndroidTest \
              -Pripdpi.localNativeAbis=x86_64 \
              -Pandroid.testInstrumentationRunnerArguments.package=com.poyka.ripdpi.integration || {
              adb logcat -d > android-logcat.txt
              exit 1
            }
            ./gradlew :app:connectedDebugAndroidTest \
              -Pripdpi.localNativeAbis=x86_64 \
              -Pandroid.testInstrumentationRunnerArguments.package=com.poyka.ripdpi.e2e \
              -Pandroid.testInstrumentationRunnerArguments.ripdpi.fixtureControlHost=10.0.2.2 \
              -Pandroid.testInstrumentationRunnerArguments.ripdpi.fixtureControlPort=46090 || {
              adb logcat -d > android-logcat.txt
              exit 1
            }
            ./gradlew :app:createDebugAndroidTestCoverageReport \
              -Pripdpi.localNativeAbis=x86_64
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ "${{ github.event.inputs.run_maestro_smoke }}" = "true" ]; then
              mkdir -p "$RUNNER_TEMP/maestro"
              curl -Ls https://get.maestro.mobile.dev | bash
              export PATH="$PATH:$HOME/.maestro/bin"
              maestro --version
              bash scripts/ci/run-maestro-smoke.sh \
                2>&1 | tee "$RUNNER_TEMP/maestro/maestro-smoke.log"
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ "${{ github.event.inputs.run_appium_smoke }}" = "true" ]; then
              npm install -g appium
              appium driver install uiautomator2
              pip install -r appium/requirements.txt
              timeout 900 bash scripts/ci/run-appium-smoke.sh \
                2>&1 | tee "$RUNNER_TEMP/appium-smoke.log"
            fi

      - name: Upload Android E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-network-e2e-artifacts
          path: |
            android-logcat.txt
            app/build/reports/androidTests/
            app/build/reports/coverage/
            app/build/outputs/code_coverage/
            ${{ runner.temp }}/local-network-fixture/
            ${{ runner.temp }}/appium-smoke.log
            appium/appium-report.html
            appium/screenshots/
          retention-days: 7

      - name: Capture fixture state
        if: always()
        run: |
          curl -fsS http://127.0.0.1:46090/manifest > "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json" || true
          curl -fsS http://127.0.0.1:46090/events > "$RUNNER_TEMP/local-network-fixture/fixture-events.json" || true

      - name: Capture emulator logcat
        if: always()
        run: adb logcat -d > android-logcat.txt || true

      - name: Stop local network fixture
        if: always()
        run: scripts/ci/stop-local-network-fixture.sh "$RUNNER_TEMP/local-network-fixture/fixture.pid"

      - name: Upload Android network E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-network-e2e-artifacts
          path: |
            android-logcat.txt
            app/build/reports/androidTests/connected/
            app/build/reports/coverage/
            app/build/outputs/code_coverage/
            app/build/outputs/androidTest-results/connected/
            ${{ runner.temp }}/maestro/
            ${{ runner.temp }}/appium-smoke.log
            appium/appium-report.html
            appium/screenshots/
            ${{ runner.temp }}/local-network-fixture/fixture.log
            ${{ runner.temp }}/local-network-fixture/fixture-manifest.json
            ${{ runner.temp }}/local-network-fixture/fixture-events.json
          retention-days: 7

  linux-tun-e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tun-e2e'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install Linux TUN prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

      - name: Run Linux TUN E2E
        run: |
          sudo env \
            "PATH=$HOME/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            "CARGO_HOME=$HOME/.cargo" \
            "RUSTUP_HOME=$HOME/.rustup" \
            "RIPDPI_RUN_TUN_E2E=1" \
            bash scripts/ci/run-linux-tun-e2e.sh

  linux-tun-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve soak profile
        id: tun-soak-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Install Linux TUN prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

      - name: Run Linux TUN soak
        run: |
          mkdir -p "$RUNNER_TEMP/linux-tun-soak-artifacts"
          sudo env \
            "PATH=$HOME/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            "CARGO_HOME=$HOME/.cargo" \
            "RUSTUP_HOME=$HOME/.rustup" \
            "RIPDPI_SOAK_PROFILE=${{ steps.tun-soak-profile.outputs.profile }}" \
            bash scripts/ci/run-linux-tun-soak.sh "$RUNNER_TEMP/linux-tun-soak-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/linux-tun-soak-artifacts/linux-tun-soak.log"

      - name: Capture Linux route and interface state
        if: always()
        run: |
          ip route show > "$RUNNER_TEMP/linux-tun-soak-artifacts/ip-route.txt" || true
          ip link show > "$RUNNER_TEMP/linux-tun-soak-artifacts/ip-link.txt" || true

      - name: Upload Linux TUN soak artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-tun-soak-artifacts
          path: |
            ${{ runner.temp }}/linux-tun-soak-artifacts/
          retention-days: 7
