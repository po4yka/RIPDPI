name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install native verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "cmake=$(grep '^ripdpi.nativeCmakeVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}" "cmake;${{ steps.native-toolchain.outputs.cmake }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Verify packaged native ELFs
        run: python3 scripts/ci/verify_native_elfs.py

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports/tests/"
          retention-days: 7

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install native analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "cmake=$(grep '^ripdpi.nativeCmakeVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}" "cmake;${{ steps.native-toolchain.outputs.cmake }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run native static analysis
        run: bash scripts/ci/run-cppcheck.sh

      - name: Run static analysis
        run: ./gradlew staticAnalysis

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/detekt/
            **/build/reports/cppcheck/
            **/build/reports/ktlint/
            **/build/reports/lint-results*.html
          retention-days: 7
