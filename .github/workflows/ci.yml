name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      soak_profile:
        description: Native soak profile for manual runs
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full
      run_maestro_smoke:
        description: Run Maestro smoke flows after Android instrumentation
        required: false
        default: false
        type: boolean
      run_appium_smoke:
        description: Run Appium smoke tests after Android instrumentation
        required: false
        default: false
        type: boolean
      run_native_soak:
        description: Run native Rust soak suites
        required: false
        default: false
        type: boolean
      run_native_load:
        description: Run native Rust load suites
        required: false
        default: false
        type: boolean
      run_nightly_coverage:
        description: Run full nightly coverage flow
        required: false
        default: false
        type: boolean
      run_rust_criterion_bench:
        description: Run Rust criterion benchmarks
        required: false
        default: false
        type: boolean
      run_android_macrobenchmark:
        description: Run Android macrobenchmark suite
        required: false
        default: false
        type: boolean
      run_android_network_e2e:
        description: Run Android network E2E emulator suite
        required: false
        default: false
        type: boolean
      run_android_relay_smoke:
        description: Run Android relay emulator smoke suite
        required: false
        default: false
        type: boolean
      run_phase0_baseline:
        description: Capture the full Phase 0 baseline snapshot
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-android
          rust-cache-save: ${{ github.ref == 'refs/heads/main' }}
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build debug APK and run unit tests
        env:
          RUSTC_WRAPPER: sccache
        run: ./gradlew assembleDebug testDebugUnitTest

      - name: Verify diagnostics-service boundary
        run: python3 scripts/ci/verify_diagnostics_boundary.py

      - name: Verify screenshot baselines
        run: ./gradlew verifyRoborazziDebug

      - name: Verify packaged native ELFs
        run: python3 scripts/ci/verify_native_elfs.py

      - name: Verify packaged native library sizes
        run: |
          mkdir -p "$RUNNER_TEMP/native-size-report"
          python3 scripts/ci/verify_native_sizes.py \
            --report-json "$RUNNER_TEMP/native-size-report/native-size-report.json" \
            --report-md "$RUNNER_TEMP/native-size-report/native-size-report.md"

      - name: Upload native size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-size-report
          path: ${{ runner.temp }}/native-size-report/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/golden-diffs/
            **/build/outputs/roborazzi/
          retention-days: 7

  release-verification:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify minified release build
        env:
          RUSTC_WRAPPER: sccache
        run: ./gradlew :app:assembleRelease

      - name: Upload release retrace inputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-retrace-inputs
          path: |
            app/build/outputs/mapping/release/mapping.txt
            app/build/intermediates/compose_mapping/release/compose-mapping.txt
          retention-days: 7

      - name: Upload release native symbols
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-native-symbols
          path: app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out/**
          if-no-files-found: ignore
          retention-days: 7

  native-bloat:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          setup-gradle: "false"

      - name: Install cargo-bloat
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: Verify representative native bloat hotspots
        run: |
          mkdir -p "$RUNNER_TEMP/native-bloat-report"
          python3 scripts/ci/verify_native_bloat.py \
            --report-json "$RUNNER_TEMP/native-bloat-report/native-bloat-report.json" \
            --report-md "$RUNNER_TEMP/native-bloat-report/native-bloat-report.md"

      - name: Upload native bloat attribution report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-bloat-report
          path: ${{ runner.temp }}/native-bloat-report/*
          if-no-files-found: error
          retention-days: 14

      - name: Dump current native bloat baseline (on failure)
        if: failure()
        run: python3 scripts/ci/verify_native_bloat.py --dump-current > /tmp/native-bloat-baseline.json

      - name: Upload native bloat baseline (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-bloat-baseline
          path: /tmp/native-bloat-baseline.json
          retention-days: 14

  rust-miri:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri,rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          shared-key: rust-miri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run targeted Miri smoke
        run: bash scripts/ci/run-rust-miri.sh

  cargo-deny:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0

      - name: Run cargo-deny
        run: cargo deny --manifest-path native/rust/Cargo.toml check

  rust-lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          shared-key: rust-lint
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: mozilla-actions/sccache-action@v0.0.9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Run Rust lint checks
        env:
          RUSTC_WRAPPER: sccache
        run: bash scripts/ci/run-rust-lint.sh

  rust-cross-check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-cross-check
          rust-cache-save: ${{ github.ref == 'refs/heads/main' }}
          setup-gradle: "false"

      - name: Run Android ABI cross-compilation checks
        run: bash scripts/ci/run-rust-cross-check.sh

  rust-workspace-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          shared-key: rust-workspace-tests
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: mozilla-actions/sccache-action@v0.0.9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run Rust workspace tests and architecture checks
        env:
          RUSTC_WRAPPER: sccache
        run: bash scripts/ci/run-rust-workspace-tests.sh

      - name: Upload Rust analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-workspace-tests-reports
          path: native/rust/target/golden-diffs/
          retention-days: 7

  rust-fuzz-smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/rust -> target
            native/rust/fuzz -> target
          cache-on-failure: true
          shared-key: rust-fuzz-smoke
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Run fuzz smoke check
        run: bash scripts/ci/run-rust-fuzz-smoke.sh

  gradle-static-analysis:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run static analysis
        run: ./gradlew staticAnalysis

      - name: Upload Gradle analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-static-analysis-reports
          path: |
            **/build/reports/detekt/
            build/reports/file-loc-limits/
            **/build/reports/ktlint/
            **/build/reports/lint-results*.html
          retention-days: 7

  rust-network-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run repo-owned Rust network E2E
        run: bash scripts/ci/run-rust-network-e2e.sh

  relay-interoperability:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          shared-key: relay-interoperability
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run relay interoperability suite
        run: bash scripts/ci/run-rust-relay-interoperability.sh

  cli-packet-smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install CLI packet capture tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y jq tcpdump tshark
          sudo setcap cap_net_raw,cap_net_admin=eip "$(command -v tcpdump)"

      - name: Run CLI packet smoke matrix
        run: bash scripts/ci/run-cli-packet-smoke.sh

      - name: Upload CLI packet smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-packet-smoke
          path: build/packet-smoke/cli/**
          retention-days: 7

  rust-turmoil:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run turmoil-backed deterministic network tests
        run: bash scripts/ci/run-rust-turmoil-tests.sh

  coverage:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      RIPDPI_ENFORCE_COVERAGE_THRESHOLDS: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: llvm-tools
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate Kotlin coverage reports
        run: ./gradlew coverageReport

      - name: Generate Rust coverage reports
        run: bash scripts/ci/run-rust-coverage.sh

      - name: Summarize coverage
        run: |
          python3 scripts/ci/summarize_coverage.py \
            --aggregate-xml build/reports/jacoco/kotlinCoverageReport/kotlinCoverageReport.xml \
            --module app=app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:data=core/data/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:diagnostics=core/diagnostics/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:engine=core/engine/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:service=core/service/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --rust-metrics-env native/rust/target/coverage/metrics.env \
            --markdown-output "$RUNNER_TEMP/coverage-summary.md"
          cat "$RUNNER_TEMP/coverage-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts
          path: |
            build/reports/jacoco/
            app/build/reports/jacoco/
            core/**/build/reports/jacoco/
            native/rust/target/coverage/
          retention-days: 7

  rust-criterion-bench:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_rust_criterion_bench == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          prefix-key: criterion

      - name: Restore criterion baseline from main
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: native/rust/target/criterion
          key: criterion-baseline-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            criterion-baseline-

      - name: Run criterion benchmarks
        run: |
          cd native/rust
          cargo bench --package ripdpi-bench 2>&1 | tee "$RUNNER_TEMP/criterion-output.txt"

      - name: Check for regressions
        run: |
          python3 scripts/ci/check-criterion-regressions.py \
            --criterion-dir native/rust/target/criterion \
            --baseline scripts/ci/rust-bench-baseline.json \
            --warn-only \
            --markdown-output "$RUNNER_TEMP/criterion-summary.md"
          cat "$RUNNER_TEMP/criterion-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Save criterion baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: native/rust/target/criterion
          key: criterion-baseline-${{ github.sha }}

      - name: Upload criterion artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-bench-artifacts
          path: |
            native/rust/target/criterion/
            ${{ runner.temp }}/criterion-output.txt
            ${{ runner.temp }}/criterion-summary.md
          retention-days: 7

  phase0-baseline:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_phase0_baseline == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"

      - name: Resolve baseline profile
        id: baseline-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="smoke"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Capture full Phase 0 baseline snapshot
        run: |
          mkdir -p "$RUNNER_TEMP/phase0-baseline"
          RIPDPI_SOAK_PROFILE="${{ steps.baseline-profile.outputs.profile }}" \
            bash scripts/ci/run-phase0-baseline.sh "$RUNNER_TEMP/phase0-baseline" \
            2>&1 | tee "$RUNNER_TEMP/phase0-baseline/phase0-baseline.log"

      - name: Upload Phase 0 baseline artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase0-baseline-artifacts
          path: |
            ${{ runner.temp }}/phase0-baseline/
          retention-days: 14

  android-macrobenchmark:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_macrobenchmark == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-targets: x86_64-linux-android
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run macrobenchmarks
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 8G
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: bash scripts/ci/run-android-macrobenchmark.sh
        env:
          RUSTC_WRAPPER: sccache

      - name: Check for regressions
        run: |
          python3 scripts/ci/check-macrobenchmark-regressions.py \
            --results-dir baselineprofile/build/outputs/connected_android_test_additional_output \
            --baseline scripts/ci/macrobenchmark-baseline.json \
            --warn-only \
            --markdown-output "$RUNNER_TEMP/macrobenchmark-summary.md"
          cat "$RUNNER_TEMP/macrobenchmark-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macrobenchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macrobenchmark-artifacts
          path: |
            baselineprofile/build/outputs/
            ${{ runner.temp }}/macrobenchmark-summary.md
          retention-days: 7

  android-integration-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-android-rust
        with:
          rust-components: ""
          rust-targets: x86_64-linux-android
          rust-cache-shared-key: rust-android
          rust-cache-save: "false"
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 8G
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: bash scripts/ci/run-android-integration-emulator.sh

      - name: Capture emulator logcat
        if: always()
        run: |
          if adb devices | grep -q 'emulator'; then
            adb logcat -d > android-logcat.txt || true
          else
            touch android-logcat.txt
          fi

      - name: Upload Android integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-integration-artifacts
          path: |
            android-logcat.txt
            ${{ runner.temp }}/android-instrumented-target.txt
            app/build/reports/androidTests/connected/
            app/build/reports/coverage/
            app/build/outputs/code_coverage/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7

  rust-loom:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          prefix-key: loom

      - name: Run loom concurrency tests
        env:
          LOOM_MAX_PREEMPTIONS: 3
        run: |
          cd native/rust
          cargo test --features loom -- loom

  rust-native-soak:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_native_soak == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve soak profile
        id: soak-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Run native Rust soak suites
        run: |
          mkdir -p "$RUNNER_TEMP/native-soak-artifacts"
          RIPDPI_SOAK_PROFILE="${{ steps.soak-profile.outputs.profile }}" \
            bash scripts/ci/run-rust-native-soak.sh "$RUNNER_TEMP/native-soak-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/native-soak-artifacts/rust-native-soak.log"

      - name: Upload native soak artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-soak-artifacts
          path: |
            ${{ runner.temp }}/native-soak-artifacts/
          retention-days: 7

  rust-native-load:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_native_load == 'true')
    runs-on: ubuntu-latest
    steps:
