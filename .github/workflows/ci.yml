name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - uses: android-actions/setup-android@v3

      - name: Install native verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Verify packaged native ELFs
        run: python3 scripts/ci/verify_native_elfs.py

      - name: Verify packaged native library sizes
        run: python3 scripts/ci/verify_native_sizes.py

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports/tests/"
          retention-days: 7

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - uses: android-actions/setup-android@v3

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run native Rust checks
        run: bash scripts/ci/run-rust-native-checks.sh

      - name: Run static analysis
        run: ./gradlew staticAnalysis

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/detekt/
            **/build/reports/ktlint/
            **/build/reports/lint-results*.html
          retention-days: 7

  android-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - uses: android-actions/setup-android@v3

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run connected Android integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_8
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            set -euo pipefail
            ./gradlew :app:connectedDebugAndroidTest -Pripdpi.localNativeAbis=x86_64 || {
              adb logcat -d > android-logcat.txt
              exit 1
            }

      - name: Capture emulator logcat
        if: always()
        run: adb logcat -d > android-logcat.txt || true

      - name: Upload Android integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-integration-artifacts
          path: |
            android-logcat.txt
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7
