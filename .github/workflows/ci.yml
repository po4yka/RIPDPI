name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      soak_profile:
        description: Native soak profile for manual runs
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install native verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK and run unit tests
        env:
          RUSTC_WRAPPER: sccache
        run: ./gradlew assembleDebug testDebugUnitTest

      - name: Verify packaged native ELFs
        run: python3 scripts/ci/verify_native_elfs.py

      - name: Verify packaged native library sizes
        run: python3 scripts/ci/verify_native_sizes.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/golden-diffs/
          retention-days: 7

  static-analysis:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: gradle/actions/setup-gradle@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: native/rust/Cargo.toml

      - name: Run cargo-deny (byedpi)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: native/rust/third_party/byedpi/Cargo.toml

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run native Rust checks
        env:
          RUSTC_WRAPPER: sccache
        run: bash scripts/ci/run-rust-native-checks.sh

      - name: Run static analysis
        run: ./gradlew staticAnalysis

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/detekt/
            build/reports/file-loc-limits/
            **/build/reports/ktlint/
            **/build/reports/lint-results*.html
            native/rust/target/golden-diffs/
          retention-days: 7

  rust-network-e2e:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run repo-owned Rust network E2E
        run: bash scripts/ci/run-rust-network-e2e.sh

  coverage:
    if: github.event_name != 'schedule'
    needs: [build, static-analysis]
    runs-on: ubuntu-latest
    env:
      RIPDPI_ENFORCE_COVERAGE_THRESHOLDS: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy, llvm-tools

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain-coverage
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain-coverage.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate Kotlin coverage reports
        run: ./gradlew coverageReport

      - name: Generate Rust coverage reports
        run: bash scripts/ci/run-rust-coverage.sh

      - name: Summarize coverage
        run: |
          python3 scripts/ci/summarize_coverage.py \
            --aggregate-xml build/reports/jacoco/kotlinCoverageReport/kotlinCoverageReport.xml \
            --module app=app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:data=core/data/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:diagnostics=core/diagnostics/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:engine=core/engine/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --module core:service=core/service/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml \
            --rust-metrics-env native/rust/target/coverage/metrics.env \
            --markdown-output "$RUNNER_TEMP/coverage-summary.md"
          cat "$RUNNER_TEMP/coverage-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            build/reports/jacoco/
            app/build/reports/jacoco/
            core/**/build/reports/jacoco/
            native/rust/target/coverage/
          retention-days: 7

  rust-loom:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true
          prefix-key: loom

      - name: Run loom concurrency tests
        env:
          LOOM_MAX_PREEMPTIONS: 3
        run: |
          cd native/rust
          cargo test --features loom -- loom

  rust-native-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve soak profile
        id: soak-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Run native Rust soak suites
        run: |
          mkdir -p "$RUNNER_TEMP/native-soak-artifacts"
          RIPDPI_SOAK_PROFILE="${{ steps.soak-profile.outputs.profile }}" \
            bash scripts/ci/run-rust-native-soak.sh "$RUNNER_TEMP/native-soak-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/native-soak-artifacts/rust-native-soak.log"

      - name: Upload native soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-native-soak-artifacts
          path: |
            ${{ runner.temp }}/native-soak-artifacts/
          retention-days: 7

  android-network-e2e:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Read native toolchain policy
        id: native-toolchain
        run: |
          echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Install Rust Android targets
        run: rustup target add x86_64-linux-android

      - name: Install NDK
        run: sdkmanager --install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Start local network fixture
        run: |
          mkdir -p "$RUNNER_TEMP/local-network-fixture"
          scripts/ci/start-local-network-fixture.sh \
            "$RUNNER_TEMP/local-network-fixture/fixture.log" \
            "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json" \
            "$RUNNER_TEMP/local-network-fixture/fixture.pid"
          cat "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json"

      - name: Run connected Android network E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_8
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            set -euo pipefail
            ./gradlew :app:connectedDebugAndroidTest \
              -Pripdpi.localNativeAbis=x86_64 \
              -Pandroid.testInstrumentationRunnerArguments.package=com.poyka.ripdpi.e2e \
              -Pandroid.testInstrumentationRunnerArguments.ripdpi.fixtureControlHost=10.0.2.2 \
              -Pandroid.testInstrumentationRunnerArguments.ripdpi.fixtureControlPort=46090 || {
              adb logcat -d > android-logcat.txt
              exit 1
            }
            ./gradlew :app:createDebugAndroidTestCoverageReport \
              -Pripdpi.localNativeAbis=x86_64

      - name: Upload Android E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-network-e2e-artifacts
          path: |
            android-logcat.txt
            app/build/reports/androidTests/
            app/build/reports/coverage/
            app/build/outputs/code_coverage/
            ${{ runner.temp }}/local-network-fixture/
          retention-days: 7

      - name: Capture fixture state
        if: always()
        run: |
          curl -fsS http://127.0.0.1:46090/manifest > "$RUNNER_TEMP/local-network-fixture/fixture-manifest.json" || true
          curl -fsS http://127.0.0.1:46090/events > "$RUNNER_TEMP/local-network-fixture/fixture-events.json" || true

      - name: Capture emulator logcat
        if: always()
        run: adb logcat -d > android-logcat.txt || true

      - name: Stop local network fixture
        if: always()
        run: scripts/ci/stop-local-network-fixture.sh "$RUNNER_TEMP/local-network-fixture/fixture.pid"

      - name: Upload Android network E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-network-e2e-artifacts
          path: |
            android-logcat.txt
            app/build/reports/androidTests/connected/
            app/build/reports/coverage/
            app/build/outputs/code_coverage/
            app/build/outputs/androidTest-results/connected/
            ${{ runner.temp }}/local-network-fixture/fixture.log
            ${{ runner.temp }}/local-network-fixture/fixture-manifest.json
            ${{ runner.temp }}/local-network-fixture/fixture-events.json
          retention-days: 7

  linux-tun-e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tun-e2e'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Install Linux TUN prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

      - name: Run Linux TUN E2E
        run: |
          sudo env \
            "PATH=$HOME/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            "CARGO_HOME=$HOME/.cargo" \
            "RUSTUP_HOME=$HOME/.rustup" \
            "RIPDPI_RUN_TUN_E2E=1" \
            cargo test --manifest-path native/rust/Cargo.toml -p hs5t-android --test linux_tun_e2e -- --ignored --nocapture

  linux-tun-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with native/rust/rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/rust -> target
          cache-on-failure: true

      - name: Resolve soak profile
        id: tun-soak-profile
        run: |
          profile="${{ github.event.inputs.soak_profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            profile="full"
          elif [ -z "$profile" ]; then
            profile="smoke"
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Install Linux TUN prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2
          sudo mkdir -p /dev/net
          if [ ! -c /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

      - name: Run Linux TUN soak
        run: |
          mkdir -p "$RUNNER_TEMP/linux-tun-soak-artifacts"
          sudo env \
            "PATH=$HOME/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            "CARGO_HOME=$HOME/.cargo" \
            "RUSTUP_HOME=$HOME/.rustup" \
            "RIPDPI_SOAK_PROFILE=${{ steps.tun-soak-profile.outputs.profile }}" \
            bash scripts/ci/run-linux-tun-soak.sh "$RUNNER_TEMP/linux-tun-soak-artifacts" \
            2>&1 | tee "$RUNNER_TEMP/linux-tun-soak-artifacts/linux-tun-soak.log"

      - name: Capture Linux route and interface state
        if: always()
        run: |
          ip route show > "$RUNNER_TEMP/linux-tun-soak-artifacts/ip-route.txt" || true
          ip link show > "$RUNNER_TEMP/linux-tun-soak-artifacts/ip-link.txt" || true

      - name: Upload Linux TUN soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-tun-soak-artifacts
          path: |
            ${{ runner.temp }}/linux-tun-soak-artifacts/
          retention-days: 7
