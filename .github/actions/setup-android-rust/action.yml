name: Setup Android + Rust
description: Shared setup for Java, Rust toolchain, Android SDK/NDK, sccache, and Gradle

inputs:
  rust-components:
    description: Comma-separated Rust components to install (e.g. "rustfmt, clippy")
    required: false
    default: ""
  rust-targets:
    description: Space-separated Rust targets to add
    required: false
    default: "aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android"
  rust-cache-shared-key:
    description: Shared key for Swatinem/rust-cache
    required: false
    default: "rust-android"
  rust-cache-save:
    description: Whether to save the Rust cache (set false for restore-only)
    required: false
    default: "true"
  gradle-cache-read-only:
    description: Whether Gradle cache is read-only
    required: false
    default: "false"
  java-version:
    description: Java version to install
    required: false
    default: "17"
  setup-gradle:
    description: Whether to set up Gradle
    required: false
    default: "true"
  skip-android-sdk-ndk:
    description: Skip Android SDK + NDK installation (for Rust-only jobs that don't touch Android)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    # Keep in sync with native/rust/rust-toolchain.toml
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "1.94.0"
        components: ${{ inputs.rust-components }}

    # Android CLI bootstrap from the official dl.google.com installer. The
    # old d.android.com/tools/agents/install.sh path now redirects to HTML,
    # so fetch the installer explicitly and validate it before execution.
    - name: Install Android CLI
      if: inputs.skip-android-sdk-ndk != 'true'
      shell: bash
      run: |
        set -euo pipefail
        installer="$RUNNER_TEMP/android-cli-install.sh"
        curl -fsSL "https://dl.google.com/android/cli/latest/linux_x86_64/install.sh" -o "$installer"
        if ! head -n 1 "$installer" | grep -Eq '^#!/'; then
          echo "Android CLI installer did not look like a shell script" >&2
          echo "First bytes from payload:" >&2
          head -c 200 "$installer" >&2 || true
          exit 1
        fi
        bash "$installer"
        android --version

    - name: Read native toolchain policy
      if: inputs.skip-android-sdk-ndk != 'true'
      id: native-toolchain
      shell: bash
      run: |
        echo "ndk=$(grep '^ripdpi.nativeNdkVersion=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
        echo "compile-sdk=$(grep '^ripdpi.compileSdk=' gradle.properties | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

    # Cache the android CLI's SDK+NDK directory (~/.android). The android CLI
    # writes platform-tools, platforms, and NDK packages here, not to
    # $ANDROID_HOME (/usr/local/lib/android/sdk). Cache key includes the
    # compile-sdk and NDK version so bumping either invalidates the cache, plus
    # a hash of this action file so changes to the install commands also
    # invalidate it.
    - name: Cache Android SDK and NDK
      if: inputs.skip-android-sdk-ndk != 'true'
      id: cache-android-sdk
      uses: actions/cache@v5
      with:
        path: ~/.android
        key: android-sdk-${{ runner.os }}-${{ steps.native-toolchain.outputs.compile-sdk }}-${{ steps.native-toolchain.outputs.ndk }}-${{ hashFiles('.github/actions/setup-android-rust/action.yml') }}

    - name: Install Android SDK baseline via android CLI
      if: inputs.skip-android-sdk-ndk != 'true' && steps.cache-android-sdk.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        android sdk install \
          "platform-tools" \
          "platforms;android-${{ steps.native-toolchain.outputs.compile-sdk }}"

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: native/rust -> target
        cache-on-failure: true
        shared-key: ${{ inputs.rust-cache-shared-key }}
        save-if: ${{ inputs.rust-cache-save }}

    - name: Install Rust Android targets
      if: inputs.rust-targets != ''
      shell: bash
      run: rustup target add ${{ inputs.rust-targets }}

    - name: Install NDK via android CLI
      if: inputs.skip-android-sdk-ndk != 'true' && steps.cache-android-sdk.outputs.cache-hit != 'true'
      shell: bash
      run: android sdk install "ndk;${{ steps.native-toolchain.outputs.ndk }}"

    - uses: mozilla-actions/sccache-action@v0.0.9
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    - name: Configure shared Gradle build cache
      if: inputs.setup-gradle == 'true'
      shell: bash
      run: |
        mkdir -p ~/.gradle/init.d
        cat > ~/.gradle/init.d/ci-build-cache.gradle << 'GRADLE'
        settingsEvaluated { settings ->
          settings.buildCache {
            local {
              directory = new File(System.getenv("RUNNER_TEMP"), "gradle-build-cache")
            }
          }
        }
        GRADLE

    - name: Restore shared Gradle build cache (read-only)
      if: inputs.setup-gradle == 'true' && inputs.gradle-cache-read-only == 'true'
      uses: actions/cache/restore@v5
      with:
        path: ${{ runner.temp }}/gradle-build-cache
        key: gradle-build-cache-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/libs.versions.toml') }}-${{ github.sha }}
        restore-keys: |
          gradle-build-cache-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/libs.versions.toml') }}-
          gradle-build-cache-

    - name: Shared Gradle build cache
      if: inputs.setup-gradle == 'true' && inputs.gradle-cache-read-only != 'true'
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/gradle-build-cache
        key: gradle-build-cache-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/libs.versions.toml') }}-${{ github.sha }}
        restore-keys: |
          gradle-build-cache-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/libs.versions.toml') }}-
          gradle-build-cache-

    - uses: gradle/actions/setup-gradle@v6
      if: inputs.setup-gradle == 'true'
      with:
        cache-read-only: ${{ inputs.gradle-cache-read-only }}
