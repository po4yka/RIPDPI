[package]
name = "ripdpi-tunnel-android"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
android-support = { workspace = true }
arc-swap = { workspace = true }
ripdpi-tunnel-config = { workspace = true }
ripdpi-tunnel-core = { workspace = true }
jni = { workspace = true }
log = { workspace = true }
loom = { workspace = true, optional = true }
nix = { workspace = true }
once_cell = { workspace = true }
ripdpi-telemetry = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }

[dev-dependencies]
golden-test-support = { workspace = true }
ripdpi-tun-driver = { workspace = true }
jni = { workspace = true, features = ["invocation"] }
libc = { workspace = true }
local-network-fixture = { workspace = true }
native-soak-support = { workspace = true }
proptest = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
loom = ["dep:loom"]
io-uring = ["ripdpi-tunnel-core/io-uring"]
