[advisories]
# Vulnerabilities are denied by default; list specific advisory IDs to ignore.
ignore = [
    # paste 1.0.15 (proc-macro, no runtime risk) -- unmaintained but pulled
    # transitively via netlink-packet-core; no updated upstream version available.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # Additional permissive licenses used by transitive deps
    "0BSD",
    "Zlib",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    # aws-lc-sys (used by rustls)
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
