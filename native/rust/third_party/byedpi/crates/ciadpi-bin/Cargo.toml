[package]
name = "ciadpi-bin"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
ciadpi-config = { path = "../ciadpi-config" }
nix = { version = "0.29", features = ["net", "fs", "mman", "signal", "process"] }
ripdpi-runtime = { path = "../../../../crates/ripdpi-runtime" }

[[bin]]
name = "ciadpi"
path = "src/main.rs"

[dev-dependencies]
libc = "0.2"
rcgen = "0.13.2"
rustls = "0.23.37"
